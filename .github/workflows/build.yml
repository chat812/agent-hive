name: Build & Release

on:
  push:
    branches: [main, hydra]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-landlord:
    name: Landlord (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agent-hive-landlord-windows-amd64.exe
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-hive-landlord-linux-amd64
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-hive-landlord-macos-amd64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-hive-landlord-macos-arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        working-directory: bridge
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: cp "bridge/target/${{ matrix.target }}/release/agent-hive-landlord${{ matrix.ext }}" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  build-coworker:
    name: Coworker (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: coworker-windows-amd64.exe
            ext: .exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: coworker-linux-amd64
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: coworker-macos-amd64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: coworker-macos-arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        working-directory: coworker
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: cp "coworker/target/${{ matrix.target }}/release/coworker${{ matrix.ext }}" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [build-landlord, build-coworker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/hydra'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Flatten artifacts
        run: find release-assets -type f -exec mv {} . \;
      - name: Generate tag
        id: tag
        run: echo "tag=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Build ${{ steps.tag.outputs.tag }}
          body: |
            Automated build from `${{ github.sha }}`
          files: |
            agent-hive-landlord-*
            coworker-*
