name: Build

on:
  push:
    branches: [main, hydra]
  pull_request:
    branches: [main]

jobs:
  build-landlord:
    name: Landlord (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: agent-hive-landlord-windows-amd64.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-hive-landlord-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: agent-hive-landlord-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-hive-landlord-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-hive-landlord-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        working-directory: bridge
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: |
          cd bridge/target/${{ matrix.target }}/release
          src=$(ls agent-hive-landlord* | head -1)
          cp "$src" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bridge/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  build-coworker:
    name: Coworker (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: coworker-windows-amd64.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: coworker-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: coworker-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: coworker-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: coworker-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        working-directory: coworker
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: |
          cd coworker/target/${{ matrix.target }}/release
          src=$(ls coworker* | head -1)
          cp "$src" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: coworker/target/${{ matrix.target }}/release/${{ matrix.artifact }}
